services:

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - spring-microservices-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build: ./microservicios-eureka
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - spring-microservices-network
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761"]
      interval: 10s
      timeout: 5s
      retries: 5


  microservices-users:
    build: ./microservices-users
    container_name: microservices-users-container
    ports:
      - "8081:8081"
    networks:
      - spring-microservices-network
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql-users:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  microservices-cursos:
    build: ./microservicios-cursos
    container_name: microservices-cursos-container
    ports:
      - "8082:8082"
    networks:
      - spring-microservices-network
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres-cursos:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  microservices-exams:
    build: ./microservices-exams
    container_name: microservices-exams-container
    ports:
      - "8083:8083"
    networks:
      - spring-microservices-network
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mongo-services:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  microservices-payments:
    build: ./microservices-payments
    container_name: microservices-payments-container
    ports:
      - "8084:8084"
    networks:
      - spring-microservices-network
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mongo-payments:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  microservices-gateway:
    build: ./microservices-gateway
    container_name: microservices-gateway-container
    ports:
      - "8090:8090"
    networks:
      - spring-microservices-network
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5


  mysql-users:
    image: mysql:8
    container_name: mysql-users
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: db_microservicios_examenes
    volumes:
      - mysql-users-data:/var/lib/mysql
    networks:
      - spring-microservices-network
    restart: always

  postgres-cursos:
    image: postgres:15
    container_name: postgres-cursos
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: db_microservicios_cursos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres-cursos-data:/var/lib/postgresql/data
    networks:
      - spring-microservices-network
    restart: always

  mongo-payments:
    image: mongo:7
    container_name: mongo-payments
    ports:
      - "27017:27017"
    volumes:
      - mongo-payments-data:/data/db
    networks:
      - spring-microservices-network
    restart: always

  mongo-services:
    image: mongo:7
    container_name: mongo-services
    ports:
      - "27018:27017"
    volumes:
      - mongo-services-data:/data/db
    networks:
      - spring-microservices-network
    restart: always

networks:
  spring-microservices-network:
    driver: bridge

volumes:
  mysql-users-data:
  postgres-cursos-data:
  mongo-payments-data:
  mongo-services-data: